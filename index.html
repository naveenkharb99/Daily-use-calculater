<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>SpeedRun Alarm | Pi Payments</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 12px;
    }
    
    .app-container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      padding: 1.2rem;
    }
    
    /* Pi Auth Section */
    .pi-section {
      background: linear-gradient(135deg, #1a472a, #0d2818);
      border-radius: 1.3rem;
      padding: 1rem;
      margin-bottom: 1rem;
      color: white;
    }
    
    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
    }
    
    .username {
      color: #facc15;
      font-weight: bold;
      font-size: 1rem;
    }
    
    .pi-btn {
      background: #facc15;
      color: #1e293b;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
    }
    
    .logout-btn {
      background: #ef4444;
      color: white;
    }
    
    .payment-card {
      background: #0d2818;
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 0.5rem;
    }
    
    .buy-btn {
      background: #10b981;
      width: 100%;
      padding: 0.6rem;
      font-size: 0.9rem;
    }
    
    .pro-badge {
      background: #fbbf24;
      color: #1e293b;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
    }
    
    /* Timer & Alarm Styles */
    .live-clock {
      background: #f1f5f9;
      border-radius: 1.5rem;
      padding: 0.8rem;
      text-align: center;
      margin: 0.6rem 0;
    }
    
    #liveClock {
      font-family: monospace;
      font-size: 2rem;
      font-weight: bold;
      color: #1e293b;
    }
    
    .tab-bar {
      display: flex;
      gap: 0.4rem;
      background: #f1f5f9;
      border-radius: 2rem;
      padding: 0.25rem;
      margin-bottom: 0.8rem;
    }
    
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.5rem;
      border-radius: 1.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    
    .tab-btn.active {
      background: #10b981;
      color: white;
    }
    
    .panel {
      display: none;
    }
    
    .panel.active-panel {
      display: block;
    }
    
    .alarm-card, .timer-card, .stopwatch-card {
      background: #f8fafc;
      border-radius: 1.3rem;
      padding: 1rem;
      margin-bottom: 0.5rem;
    }
    
    .time-row {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    
    .time-box {
      background: white;
      border-radius: 1.5rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid #cbd5e1;
    }
    
    .time-box input {
      font-size: 1.5rem;
      width: 55px;
      text-align: center;
      border: none;
      outline: none;
      font-family: monospace;
    }
    
    .set-btn {
      background: #10b981;
      color: white;
      width: 100%;
      padding: 0.6rem;
      border-radius: 2rem;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    
    .timer-display, .stopwatch-display {
      font-size: 2.2rem;
      font-family: monospace;
      text-align: center;
      background: white;
      padding: 0.5rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }
    
    .flex-btns {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    
    button {
      background: #e2e8f0;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
    }
    
    .ringing-locked {
      background: #fee2e2;
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 0.8rem;
      text-align: center;
    }
    
    .dismiss-btn {
      width: 100%;
      background: #ef4444;
      color: white;
      padding: 0.6rem;
      border-radius: 2rem;
      border: none;
      font-weight: bold;
      margin-top: 0.5rem;
    }
    
    .footnote {
      font-size: 0.6rem;
      text-align: center;
      color: #64748b;
      margin-top: 0.8rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1 style="text-align:center; color:#10b981;">🏃‍♂️ SPEED RUN ALARM</h1>
  
  <!-- Pi Section -->
  <div class="pi-section">
    <div class="user-info">
      <div>
        <div class="username" id="usernameDisplay">Not signed in</div>
        <div id="authStatus" style="font-size:0.7rem;">🔐 Sign in with Pi</div>
      </div>
      <div>
        <button id="signInBtn" class="pi-btn">🔓 Sign In</button>
        <button id="signOutBtn" class="pi-btn logout-btn" style="display:none;">Sign Out</button>
      </div>
    </div>
    
    <div class="payment-card">
      <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
        <span>✨ PRO UNLOCK</span>
        <span class="pro-badge" id="proBadge">🔒 LOCKED</span>
      </div>
      <button id="buyProBtn" class="pi-btn buy-btn" style="background:#10b981;">💎 Buy Now - 1 Pi</button>
      <div id="paymentStatus" style="font-size:0.7rem; margin-top:0.5rem; text-align:center;"></div>
    </div>
  </div>
  
  <!-- Live Clock -->
  <div class="live-clock">
    <div id="liveClock">--:--:--</div>
  </div>
  
  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="alarm">⏰ ALARM</button>
    <button class="tab-btn" data-tab="timer">⏱️ TIMER</button>
    <button class="tab-btn" data-tab="stopwatch">⚡ STOPW</button>
  </div>
  
  <!-- Alarm Panel -->
  <div id="alarmPanel" class="panel active-panel">
    <div class="alarm-card">
      <div class="time-row">
        <div class="time-box">
          <input type="number" id="hour" min="1" max="12" value="7">
          <span>:</span>
          <input type="number" id="minute" min="0" max="59" value="30">
        </div>
        <div class="time-box">
          <button id="amBtn" style="background:#10b981; color:white;">AM</button>
          <button id="pmBtn">PM</button>
        </div>
      </div>
      <button class="set-btn" id="setAlarmBtn">⏰ SET ALARM</button>
      <div id="alarmStatus" style="margin-top:0.5rem; text-align:center; font-size:0.8rem;"></div>
    </div>
    
    <div id="ringingSection" style="display:none;">
      <div class="ringing-locked">
        <h3>🔊 ALARM RINGING!</h3>
        <p>🏃‍♂️ Run 30 steps or reach 8 km/h to stop</p>
        <div id="stepCount">Steps: 0 / 30</div>
        <div id="speedDisplay">Speed: 0 km/h</div>
        <button id="simulateStepBtn" style="background:#f59e0b; margin:0.5rem 0;">🏃 Simulate Step</button>
        <button id="stopAlarmBtn" class="dismiss-btn" disabled>🔴 STOP (LOCKED)</button>
      </div>
    </div>
  </div>
  
  <!-- Timer Panel -->
  <div id="timerPanel" class="panel">
    <div class="timer-card">
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="flex-btns">
        <button id="startTimer">▶ START</button>
        <button id="pauseTimer">⏸ PAUSE</button>
        <button id="resetTimer">🔄 RESET</button>
      </div>
    </div>
  </div>
  
  <!-- Stopwatch Panel -->
  <div id="stopwatchPanel" class="panel">
    <div class="stopwatch-card">
      <div class="stopwatch-display" id="stopwatchDisplay">00:00:00.00</div>
      <div class="flex-btns">
        <button id="swStart">▶ START</button>
        <button id="swPause">⏸ PAUSE</button>
        <button id="swReset">🔄 RESET</button>
      </div>
    </div>
  </div>
  
  <div class="footnote">💡 Pro Unlock: 1 Pi | Alarm stops only after running 30 steps or 8 km/h</div>
</div>

<script>
  // ==================== PI NETWORK AUTHENTICATION WITH PAYMENTS SCOPE ====================
  let piUser = null;
  let piAccessToken = null;
  let hasPaymentsScope = false;
  let isProUnlocked = localStorage.getItem('pro_unlocked') === 'true';
  
  // Backend URL (change to your server URL)
  const BACKEND_URL = 'http://localhost:3000';
  
  // Update Pro UI
  function updateProUI() {
    const proBadge = document.getElementById('proBadge');
    const buyBtn = document.getElementById('buyProBtn');
    
    if (isProUnlocked) {
      proBadge.innerHTML = '✨ PRO UNLOCKED ✨';
      proBadge.style.background = '#10b981';
      buyBtn.disabled = true;
      buyBtn.style.opacity = '0.5';
      document.getElementById('authStatus').innerHTML = '✅ Pro Unlocked! Thanks for purchase';
    } else {
      proBadge.innerHTML = '🔒 LOCKED';
      proBadge.style.background = '#fbbf24';
      buyBtn.disabled = false;
      buyBtn.style.opacity = '1';
    }
  }
  
  // Validate token with Pi API
  async function validateToken(accessToken) {
    try {
      const response = await fetch('https://api.minepi.com/v2/me', {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      if (response.ok) return { valid: true, user: await response.json() };
      return { valid: false };
    } catch (error) {
      return { valid: false };
    }
  }
  
  // Save session
  function saveSession(username, token, hasPayments) {
    localStorage.setItem('pi_username', username);
    localStorage.setItem('pi_token', token);
    localStorage.setItem('pi_has_payments', hasPayments);
    localStorage.setItem('pi_session_time', Date.now().toString());
  }
  
  // Clear session
  function clearSession() {
    localStorage.removeItem('pi_username');
    localStorage.removeItem('pi_token');
    localStorage.removeItem('pi_has_payments');
    localStorage.removeItem('pi_session_time');
    piUser = null;
    piAccessToken = null;
    hasPaymentsScope = false;
    document.getElementById('usernameDisplay').innerHTML = 'Not signed in';
    document.getElementById('authStatus').innerHTML = '🔐 Sign in with Pi';
    document.getElementById('signInBtn').style.display = 'inline-block';
    document.getElementById('signOutBtn').style.display = 'none';
  }
  
  // Update Auth UI
  function updateAuthUI(username, hasPayments) {
    document.getElementById('usernameDisplay').innerHTML = `👤 ${username}`;
    if (hasPayments) {
      document.getElementById('authStatus').innerHTML = '✅ Authenticated (Payments ready)';
    } else {
      document.getElementById('authStatus').innerHTML = '⚠️ Missing payments scope - sign out and sign in again';
    }
    document.getElementById('signInBtn').style.display = 'none';
    document.getElementById('signOutBtn').style.display = 'inline-block';
  }
  
  // 🔑 CRITICAL: Authenticate with 'payments' scope
  async function authenticateWithPi() {
    try {
      document.getElementById('authStatus').innerHTML = '🔄 Requesting payments access...';
      
      // ⭐⭐⭐ IMPORTANT: यहाँ 'payments' scope जोड़ा गया है ⭐⭐⭐
      const auth = await Pi.authenticate(['username', 'payments'], { 
        onIncompletePending: true 
      });
      
      if (auth && auth.accessToken) {
        const validation = await validateToken(auth.accessToken);
        
        if (validation.valid && validation.user) {
          piAccessToken = auth.accessToken;
          piUser = validation.user;
          hasPaymentsScope = true; // Payments scope granted
          const username = validation.user.username || 'Pi User';
          
          saveSession(username, auth.accessToken, true);
          updateAuthUI(username, true);
          
          document.getElementById('paymentStatus').innerHTML = '✅ Ready for payments!';
          setTimeout(() => {
            document.getElementById('paymentStatus').innerHTML = '';
          }, 2000);
        }
      }
    } catch (error) {
      console.error('Auth error:', error);
      document.getElementById('authStatus').innerHTML = '❌ Authentication failed';
      if (error.message && error.message.includes('payments')) {
        document.getElementById('paymentStatus').innerHTML = '⚠️ Please approve payments permission';
      }
    }
  }
  
  // Initialize Pi and check session
  async function initPi() {
    try {
      if (typeof Pi === 'undefined') {
        console.error('Pi SDK not loaded');
        return;
      }
      
      await Pi.init({ version: '2.0', sandbox: true });
      
      const storedUsername = localStorage.getItem('pi_username');
      const storedToken = localStorage.getItem('pi_token');
      const storedHasPayments = localStorage.getItem('pi_has_payments') === 'true';
      const sessionTime = localStorage.getItem('pi_session_time');
      const isValid = storedToken && sessionTime && (Date.now() - parseInt(sessionTime) < 24 * 60 * 60 * 1000);
      
      if (storedToken && isValid) {
        const validation = await validateToken(storedToken);
        if (validation.valid) {
          piAccessToken = storedToken;
          piUser = validation.user;
          hasPaymentsScope = storedHasPayments;
          updateAuthUI(storedUsername, hasPaymentsScope);
          return;
        } else {
          clearSession();
        }
      }
      
      // Auto-authenticate
      await authenticateWithPi();
      
    } catch (error) {
      console.error('Init error:', error);
    }
  }
  
  // Sign out
  async function signOut() {
    clearSession();
    isProUnlocked = false;
    localStorage.removeItem('pro_unlocked');
    updateProUI();
  }
  
  // ⭐ PAYMENT FUNCTION
  async function buyPro() {
    if (!piAccessToken) {
      document.getElementById('paymentStatus').innerHTML = '❌ Please sign in first';
      return;
    }
    
    if (!hasPaymentsScope) {
      document.getElementById('paymentStatus').innerHTML = '❌ Missing payments scope. Please sign out and sign in again.';
      return;
    }
    
    if (isProUnlocked) {
      document.getElementById('paymentStatus').innerHTML = '✅ You already have Pro!';
      return;
    }
    
    document.getElementById('paymentStatus').innerHTML = '🔄 Creating payment...';
    
    try {
      const paymentData = {
        amount: 1,
        memo: "Unlock Pro Features - SpeedRun Alarm",
        metadata: { productId: "pro_unlock_v1", feature: "premium" }
      };
      
      const callbacks = {
        onReadyForServerApproval: async (paymentId) => {
          document.getElementById('paymentStatus').innerHTML = '📡 Approving payment...';
          const response = await fetch(`${BACKEND_URL}/api/payments/approve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId })
          });
          if (!response.ok) throw new Error('Approval failed');
        },
        
        onReadyForServerCompletion: async (paymentId, txid) => {
          document.getElementById('paymentStatus').innerHTML = '⛓️ Completing transaction...';
          const response = await fetch(`${BACKEND_URL}/api/payments/complete`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, txid })
          });
          
          if (response.ok) {
            isProUnlocked = true;
            localStorage.setItem('pro_unlocked', 'true');
            updateProUI();
            document.getElementById('paymentStatus').innerHTML = '🎉 Pro Unlocked! Thank you!';
          }
        },
        
        onIncompletePaymentFound: async (paymentId) => {
          document.getElementById('paymentStatus').innerHTML = '🔄 Resuming previous payment...';
        }
      };
      
      await Pi.createPayment(paymentData, callbacks);
      
    } catch (error) {
      console.error('Payment error:', error);
      document.getElementById('paymentStatus').innerHTML = `❌ Payment failed: ${error.message}`;
    }
  }
  
  // ==================== ALARM, TIMER, STOPWATCH ====================
  let alarmTime = null;
  let isRinging = false;
  let currentSteps = 0;
  let currentSpeed = 0;
  let beepInterval = null;
  let audioCtx = null;
  
  const hourInput = document.getElementById('hour');
  const minuteInput = document.getElementById('minute');
  const amBtn = document.getElementById('amBtn');
  const pmBtn = document.getElementById('pmBtn');
  let isAM = true;
  
  amBtn.onclick = () => {
    isAM = true;
    amBtn.style.background = '#10b981';
    amBtn.style.color = 'white';
    pmBtn.style.background = '#e2e8f0';
    pmBtn.style.color = '#334155';
  };
  
  pmBtn.onclick = () => {
    isAM = false;
    pmBtn.style.background = '#10b981';
    pmBtn.style.color = 'white';
    amBtn.style.background = '#e2e8f0';
    amBtn.style.color = '#334155';
  };
  
  function get24Hour() {
    let hour = parseInt(hourInput.value);
    if (isAM && hour === 12) hour = 0;
    if (!isAM && hour !== 12) hour += 12;
    return hour;
  }
  
  function setAlarm() {
    const hour24 = get24Hour();
    const minute = parseInt(minuteInput.value);
    const now = new Date();
    let alarmDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour24, minute, 0);
    if (alarmDate <= now) alarmDate.setDate(alarmDate.getDate() + 1);
    alarmTime = alarmDate.getTime();
    document.getElementById('alarmStatus').innerHTML = `⏰ Alarm set for ${alarmDate.toLocaleTimeString()}`;
  }
  
  function startRinging() {
    if (isRinging) return;
    isRinging = true;
    currentSteps = 0;
    currentSpeed = 0;
    document.getElementById('ringingSection').style.display = 'block';
    document.getElementById('stepCount').innerHTML = `Steps: 0 / 30`;
    document.getElementById('speedDisplay').innerHTML = `Speed: 0 km/h`;
    document.getElementById('stopAlarmBtn').disabled = true;
    
    // Beep sound
    if (beepInterval) clearInterval(beepInterval);
    beepInterval = setInterval(() => {
      if (isRinging) playBeep();
    }, 1500);
  }
  
  function playBeep() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
      osc.stop(audioCtx.currentTime + 0.5);
    } catch(e) {}
  }
  
  function stopRinging() {
    if (beepInterval) clearInterval(beepInterval);
    isRinging = false;
    document.getElementById('ringingSection').style.display = 'none';
    alarmTime = null;
  }
  
  function addStep() {
    if (!isRinging) return;
    if (currentSteps < 30) {
      currentSteps++;
      document.getElementById('stepCount').innerHTML = `Steps: ${currentSteps} / 30`;
      if (currentSteps >= 30) {
        stopRinging();
        alert('🎉 You ran enough! Alarm stopped!');
      }
    }
  }
  
  function checkAlarm() {
    if (!alarmTime || isRinging) return;
    if (Date.now() >= alarmTime) {
      startRinging();
    }
  }
  
  // Timer
  let timerSeconds = 0, timerActive = false, timerInt = null;
  function updateTimerDisplay() {
    let hrs = Math.floor(timerSeconds / 3600);
    let mins = Math.floor((timerSeconds % 3600) / 60);
    let secs = timerSeconds % 60;
    document.getElementById('timerDisplay').innerHTML = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }
  
  document.getElementById('startTimer').onclick = () => {
    if (timerActive) return;
    if (timerSeconds <= 0) {
      timerSeconds = 60; // default 1 minute
    }
    timerActive = true;
    timerInt = setInterval(() => {
      if (timerActive && timerSeconds > 0) {
        timerSeconds--;
        updateTimerDisplay();
      } else if (timerSeconds === 0) {
        timerActive = false;
        clearInterval(timerInt);
        alert('Timer finished!');
      }
    }, 1000);
  };
  
  document.getElementById('pauseTimer').onclick = () => {
    timerActive = false;
    if (timerInt) clearInterval(timerInt);
  };
  
  document.getElementById('resetTimer').onclick = () => {
    timerActive = false;
    if (timerInt) clearInterval(timerInt);
    timerSeconds = 0;
    updateTimerDisplay();
  };
  
  // Stopwatch
  let swMs = 0, swRun = false, swInt = null;
  function updateSwDisplay() {
    let secs = Math.floor(swMs / 1000);
    let mins = Math.floor(secs / 60);
    let hrs = Math.floor(mins / 60);
    let cent = Math.floor((swMs % 1000) / 10);
    document.getElementById('stopwatchDisplay').innerHTML = `${hrs.toString().padStart(2,'0')}:${(mins%60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}.${cent.toString().padStart(2,'0')}`;
  }
  
  document.getElementById('swStart').onclick = () => {
    if (!swRun) {
      swRun = true;
      swInt = setInterval(() => { if (swRun) { swMs += 10; updateSwDisplay(); } }, 10);
    }
  };
  
  document.getElementById('swPause').onclick = () => { swRun = false; if (swInt) clearInterval(swInt); };
  document.getElementById('swReset').onclick = () => { swRun = false; if (swInt) clearInterval(swInt); swMs = 0; updateSwDisplay(); };
  
  // Live Clock
  function updateClock() {
    document.getElementById('liveClock').innerHTML = new Date().toLocaleTimeString('en-US', { hour12: false });
  }
  
  // Event Listeners
  document.getElementById('signInBtn').onclick = authenticateWithPi;
  document.getElementById('signOutBtn').onclick = signOut;
  document.getElementById('buyProBtn').onclick = buyPro;
  document.getElementById('setAlarmBtn').onclick = setAlarm;
  document.getElementById('simulateStepBtn').onclick = addStep;
  document.getElementById('stopAlarmBtn').onclick = () => { if (currentSteps >= 30) stopRinging(); };
  
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
      document.getElementById(`${btn.dataset.tab}Panel`).classList.add('active-panel');
    };
  });
  
  // Initialize
  updateProUI();
  updateClock();
  setInterval(() => { updateClock(); checkAlarm(); }, 500);
  window.addEventListener('load', initPi);
</script>
</body>
</html>
