<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SpeedRun Alarm | Real Pi Payment</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #1a472a, #0d2818);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 16px;
    }
    
    .app-container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 1.5rem;
    }
    
    h1 { text-align: center; color: #10b981; font-size: 1.5rem; margin-bottom: 1rem; }
    
    .pi-section {
      background: linear-gradient(135deg, #1a472a, #0d2818);
      border-radius: 1.3rem;
      padding: 1rem;
      margin-bottom: 1rem;
      color: white;
    }
    
    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
    }
    
    .username { color: #facc15; font-weight: bold; font-size: 1rem; }
    
    .pi-btn {
      background: #facc15;
      color: #1e293b;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
    }
    
    .buy-btn {
      background: #10b981;
      width: 100%;
      padding: 0.6rem;
      font-size: 0.9rem;
    }
    
    .buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .pro-badge {
      background: #fbbf24;
      color: #1e293b;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-block;
    }
    
    .blur-section {
      filter: blur(5px);
      pointer-events: none;
      user-select: none;
      position: relative;
    }
    
    .blur-section::after {
      content: "🔒 BUY PRO TO UNLOCK (1 Pi) 🔒";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      color: #facc15;
      padding: 10px 20px;
      border-radius: 2rem;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }
    
    .unlocked-section { filter: none; pointer-events: auto; }
    .unlocked-section::after { display: none; }
    
    .live-clock {
      background: #f1f5f9;
      border-radius: 1.5rem;
      padding: 0.8rem;
      text-align: center;
      margin: 0.6rem 0;
    }
    
    #liveClock {
      font-family: monospace;
      font-size: 2rem;
      font-weight: bold;
      color: #1e293b;
    }
    
    .tab-bar {
      display: flex;
      gap: 0.4rem;
      background: #f1f5f9;
      border-radius: 2rem;
      padding: 0.25rem;
      margin-bottom: 0.8rem;
    }
    
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.5rem;
      border-radius: 1.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    
    .tab-btn.active { background: #10b981; color: white; }
    
    .panel { display: none; }
    .panel.active-panel { display: block; }
    
    .alarm-card, .timer-card, .stopwatch-card {
      background: #f8fafc;
      border-radius: 1.3rem;
      padding: 1rem;
      margin-bottom: 0.5rem;
    }
    
    .time-row {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    
    .time-box {
      background: white;
      border-radius: 1.5rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid #cbd5e1;
    }
    
    .time-box input {
      font-size: 1.5rem;
      width: 55px;
      text-align: center;
      border: none;
      outline: none;
      font-family: monospace;
    }
    
    .set-btn {
      background: #10b981;
      color: white;
      width: 100%;
      padding: 0.6rem;
      border-radius: 2rem;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    
    .timer-display, .stopwatch-display {
      font-size: 2.2rem;
      font-family: monospace;
      text-align: center;
      background: white;
      padding: 0.5rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }
    
    .flex-btns { display: flex; gap: 0.5rem; justify-content: center; }
    button { background: #e2e8f0; border: none; padding: 0.4rem 0.8rem; border-radius: 2rem; cursor: pointer; }
    
    .ringing-locked {
      background: #fee2e2;
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 0.8rem;
      text-align: center;
    }
    
    .dismiss-btn {
      width: 100%;
      background: #ef4444;
      color: white;
      padding: 0.6rem;
      border-radius: 2rem;
      border: none;
      font-weight: bold;
      margin-top: 0.5rem;
    }
    
    .footnote { font-size: 0.6rem; text-align: center; color: #64748b; margin-top: 0.8rem; }
    .status-msg { font-size: 0.7rem; text-align: center; margin-top: 0.5rem; padding: 0.3rem; border-radius: 1rem; }
    .status-success { background: #d1fae5; color: #065f46; }
    .status-error { background: #fee2e2; color: #991b1b; }
    .status-info { background: #dbeafe; color: #1e40af; }
  </style>
</head>
<body>
<div class="app-container">
  <h1>🏃‍♂️ SPEED RUN ALARM</h1>
  
  <!-- Pi Section -->
  <div class="pi-section">
    <div class="user-info">
      <div>
        <div class="username" id="usernameDisplay">Not signed in</div>
        <div id="authStatus" style="font-size:0.7rem;">🔐 Sign in with Pi</div>
      </div>
      <div>
        <button id="signInBtn" class="pi-btn">🔓 Sign In</button>
        <button id="signOutBtn" class="pi-btn logout-btn" style="display:none;">Sign Out</button>
      </div>
    </div>
    
    <div class="payment-card">
      <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
        <span>✨ PRO UNLOCK</span>
        <span class="pro-badge" id="proBadge">🔒 LOCKED</span>
      </div>
      <button id="buyProBtn" class="pi-btn buy-btn">💎 Buy Now - 1 Pi (Real)</button>
      <div id="paymentStatus" style="font-size:0.7rem; margin-top:0.5rem; text-align:center;"></div>
    </div>
  </div>
  
  <!-- Live Clock -->
  <div class="live-clock">
    <div id="liveClock">--:--:--</div>
  </div>
  
  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="alarm">⏰ ALARM</button>
    <button class="tab-btn" data-tab="timer">⏱️ TIMER</button>
    <button class="tab-btn" data-tab="stopwatch">⚡ STOPW</button>
  </div>
  
  <!-- Alarm Panel -->
  <div id="alarmPanel" class="panel active-panel">
    <div id="alarmContent">
      <div class="alarm-card">
        <div class="time-row">
          <div class="time-box">
            <input type="number" id="hour" min="1" max="12" value="7">
            <span>:</span>
            <input type="number" id="minute" min="0" max="59" value="30">
          </div>
          <div class="time-box">
            <button id="amBtn" style="background:#10b981; color:white;">AM</button>
            <button id="pmBtn">PM</button>
          </div>
        </div>
        <button class="set-btn" id="setAlarmBtn">⏰ SET ALARM</button>
        <div id="alarmStatus" style="margin-top:0.5rem; text-align:center; font-size:0.8rem;"></div>
      </div>
      
      <div class="speed-tracker" style="background:#f1f5f9; border-radius:1rem; padding:0.8rem; margin-top:0.5rem;">
        <h4 style="text-align:center;">🏆 SPEED TRACKER</h4>
        <div style="font-size:1.5rem; text-align:center; font-weight:bold;" id="speedValue">0.00 km/h</div>
      </div>
    </div>
    
    <div id="ringingSection" style="display:none;">
      <div class="ringing-locked">
        <h3>🔊 ALARM RINGING!</h3>
        <p>🏃‍♂️ Run 30 steps or reach 8 km/h to stop</p>
        <div id="stepCount">Steps: 0 / 30</div>
        <div id="ringingSpeed">Speed: 0 km/h</div>
        <button id="simulateStepBtn" style="background:#f59e0b; margin:0.5rem 0;">🏃 Simulate Step</button>
        <button id="stopAlarmBtn" class="dismiss-btn" disabled>🔴 STOP (LOCKED)</button>
      </div>
    </div>
  </div>
  
  <!-- Timer Panel -->
  <div id="timerPanel" class="panel">
    <div class="timer-card">
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="flex-btns">
        <button id="startTimer">▶ START</button>
        <button id="pauseTimer">⏸ PAUSE</button>
        <button id="resetTimer">🔄 RESET</button>
      </div>
    </div>
  </div>
  
  <!-- Stopwatch Panel -->
  <div id="stopwatchPanel" class="panel">
    <div class="stopwatch-card">
      <div class="stopwatch-display" id="stopwatchDisplay">00:00:00.00</div>
      <div class="flex-btns">
        <button id="swStart">▶ START</button>
        <button id="swPause">⏸ PAUSE</button>
        <button id="swReset">🔄 RESET</button>
      </div>
    </div>
  </div>
  
  <div class="footnote">💡 Pro Unlock: 1 Pi (Real Pi Network Payment) | Must use Pi Browser</div>
</div>

<script>
  // ==================== PI NETWORK REAL PAYMENT ====================
  let piAccessToken = null;
  let piUser = null;
  let isProUnlocked = localStorage.getItem('pro_unlocked') === 'true';
  
  const BACKEND_URL = 'http://localhost:3000'; // अपना backend URL डालें
  
  function updateProUI() {
    const proBadge = document.getElementById('proBadge');
    const buyBtn = document.getElementById('buyProBtn');
    const alarmContent = document.getElementById('alarmContent');
    
    if (isProUnlocked) {
      proBadge.innerHTML = '✨ PRO UNLOCKED ✨';
      proBadge.style.background = '#10b981';
      buyBtn.disabled = true;
      buyBtn.style.opacity = '0.5';
      buyBtn.innerText = '✅ PRO ACTIVE';
      alarmContent.classList.remove('blur-section');
      alarmContent.classList.add('unlocked-section');
    } else {
      proBadge.innerHTML = '🔒 LOCKED';
      proBadge.style.background = '#fbbf24';
      buyBtn.disabled = false;
      buyBtn.style.opacity = '1';
      buyBtn.innerText = '💎 Buy Now - 1 Pi (Real)';
      alarmContent.classList.add('blur-section');
      alarmContent.classList.remove('unlocked-section');
    }
  }
  
  function showStatus(message, type) {
    const statusDiv = document.getElementById('paymentStatus');
    statusDiv.innerHTML = message;
    statusDiv.className = `status-msg status-${type}`;
    setTimeout(() => {
      if (document.getElementById('paymentStatus').innerHTML === message) {
        statusDiv.innerHTML = '';
        statusDiv.className = '';
      }
    }, 5000);
  }
  
  // ==================== PI AUTHENTICATION ====================
  async function authenticateWithPi() {
    try {
      if (typeof Pi === 'undefined') {
        showStatus('❌ Please open this app in Pi Browser', 'error');
        return;
      }
      
      showStatus('🔄 Initializing Pi SDK...', 'info');
      await Pi.init({ version: '2.0', sandbox: false }); // sandbox: false for real payment
      
      showStatus('🔄 Requesting permissions...', 'info');
      
      const auth = await Pi.authenticate(['username'], {
        onIncompletePending: true
      });
      
      if (auth && auth.accessToken) {
        piAccessToken = auth.accessToken;
        const username = auth.user?.username || 'Pi User';
        
        localStorage.setItem('pi_username', username);
        localStorage.setItem('pi_token', auth.accessToken);
        localStorage.setItem('pi_session_time', Date.now().toString());
        
        piUser = { username };
        
        document.getElementById('usernameDisplay').innerHTML = `👤 ${username}`;
        document.getElementById('authStatus').innerHTML = '✅ Authenticated! Ready to buy';
        document.getElementById('signInBtn').style.display = 'none';
        document.getElementById('signOutBtn').style.display = 'inline-block';
        
        showStatus('✅ Successfully authenticated!', 'success');
      }
    } catch (error) {
      console.error('Auth error:', error);
      showStatus(`❌ Error: ${error.message}`, 'error');
    }
  }
  
  async function checkExistingSession() {
    const storedUsername = localStorage.getItem('pi_username');
    const storedToken = localStorage.getItem('pi_token');
    const sessionTime = localStorage.getItem('pi_session_time');
    const isValid = storedToken && sessionTime && (Date.now() - parseInt(sessionTime) < 24 * 60 * 60 * 1000);
    
    if (storedToken && isValid) {
      piAccessToken = storedToken;
      piUser = { username: storedUsername };
      
      document.getElementById('usernameDisplay').innerHTML = `👤 ${storedUsername}`;
      document.getElementById('authStatus').innerHTML = '✅ Authenticated! Ready to buy';
      document.getElementById('signInBtn').style.display = 'none';
      document.getElementById('signOutBtn').style.display = 'inline-block';
      return true;
    }
    return false;
  }
  
  async function signOut() {
    localStorage.removeItem('pi_username');
    localStorage.removeItem('pi_token');
    localStorage.removeItem('pi_session_time');
    localStorage.removeItem('pro_unlocked');
    
    piAccessToken = null;
    piUser = null;
    isProUnlocked = false;
    
    document.getElementById('usernameDisplay').innerHTML = 'Not signed in';
    document.getElementById('authStatus').innerHTML = '🔐 Sign in with Pi';
    document.getElementById('signInBtn').style.display = 'inline-block';
    document.getElementById('signOutBtn').style.display = 'none';
    
    updateProUI();
    showStatus('Signed out', 'info');
  }
  
  // ==================== REAL PI PAYMENT ====================
  async function buyPro() {
    if (!piAccessToken) {
      showStatus('❌ Please sign in with Pi Network first', 'error');
      return;
    }
    
    if (isProUnlocked) {
      showStatus('✅ You already have Pro!', 'success');
      return;
    }
    
    showStatus('🔄 Creating real payment...', 'info');
    
    try {
      await Pi.init({ version: '2.0', sandbox: false });
      
      const paymentData = {
        amount: 1,
        memo: "Unlock Pro Features - SpeedRun Alarm",
        metadata: { 
          productId: "pro_unlock_v1",
          productName: "Pro Unlock",
          timestamp: Date.now()
        }
      };
      
      const callbacks = {
        onReadyForServerApproval: async (paymentId) => {
          console.log('onReadyForServerApproval:', paymentId);
          showStatus('📡 Approving payment on server...', 'info');
          
          try {
            const response = await fetch(`${BACKEND_URL}/api/payments/approve`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId })
            });
            
            if (response.ok) {
              showStatus('✅ Payment approved! Waiting for blockchain...', 'success');
            } else {
              throw new Error('Approval failed');
            }
          } catch (error) {
            console.error('Approval error:', error);
            showStatus('❌ Server approval failed', 'error');
          }
        },
        
        onReadyForServerCompletion: async (paymentId, txid) => {
          console.log('onReadyForServerCompletion:', paymentId, txid);
          showStatus('⛓️ Completing transaction on blockchain...', 'info');
          
          try {
            const response = await fetch(`${BACKEND_URL}/api/payments/complete`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId, txid })
            });
            
            if (response.ok) {
              isProUnlocked = true;
              localStorage.setItem('pro_unlocked', 'true');
              updateProUI();
              showStatus('🎉 Pro Unlocked! Thank you for your purchase! 🎉', 'success');
            } else {
              throw new Error('Completion failed');
            }
          } catch (error) {
            console.error('Completion error:', error);
            showStatus('❌ Transaction completion failed', 'error');
          }
        },
        
        onIncompletePaymentFound: async (paymentId) => {
          console.log('onIncompletePaymentFound:', paymentId);
          showStatus('🔄 Found incomplete payment, resuming...', 'info');
        }
      };
      
      await Pi.createPayment(paymentData, callbacks);
      
    } catch (error) {
      console.error('Payment error:', error);
      showStatus(`❌ Payment failed: ${error.message}`, 'error');
    }
  }
  
  // ==================== ALARM FUNCTIONS (same as before) ====================
  let alarmTime = null;
  let isRinging = false;
  let currentSteps = 0;
  let currentSpeed = 0;
  let beepInterval = null;
  let audioCtx = null;
  let lastAccel = { x: 0, y: 0, z: 0 };
  let lastTimestamp = 0;
  
  const hourInput = document.getElementById('hour');
  const minuteInput = document.getElementById('minute');
  const amBtn = document.getElementById('amBtn');
  const pmBtn = document.getElementById('pmBtn');
  let isAM = true;
  
  amBtn.onclick = () => {
    isAM = true;
    amBtn.style.background = '#10b981';
    amBtn.style.color = 'white';
    pmBtn.style.background = '#e2e8f0';
    pmBtn.style.color = '#334155';
  };
  
  pmBtn.onclick = () => {
    isAM = false;
    pmBtn.style.background = '#10b981';
    pmBtn.style.color = 'white';
    amBtn.style.background = '#e2e8f0';
    amBtn.style.color = '#334155';
  };
  
  function get24Hour() {
    let hour = parseInt(hourInput.value);
    if (isNaN(hour)) hour = 7;
    if (isAM && hour === 12) hour = 0;
    if (!isAM && hour !== 12) hour += 12;
    return hour;
  }
  
  function setAlarm() {
    if (!isProUnlocked) {
      showStatus('🔒 Please buy Pro to use alarm feature!', 'error');
      return;
    }
    
    const hour24 = get24Hour();
    const minute = parseInt(minuteInput.value);
    const now = new Date();
    let alarmDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour24, minute, 0);
    if (alarmDate <= now) alarmDate.setDate(alarmDate.getDate() + 1);
    alarmTime = alarmDate.getTime();
    document.getElementById('alarmStatus').innerHTML = `⏰ Alarm set for ${alarmDate.toLocaleTimeString()}`;
    showStatus(`✅ Alarm set for ${alarmDate.toLocaleTimeString()}`, 'success');
  }
  
  function startRinging() {
    if (isRinging || !isProUnlocked) return;
    isRinging = true;
    currentSteps = 0;
    currentSpeed = 0;
    document.getElementById('ringingSection').style.display = 'block';
    document.getElementById('stepCount').innerHTML = `Steps: 0 / 30`;
    document.getElementById('ringingSpeed').innerHTML = `Speed: 0 km/h`;
    document.getElementById('stopAlarmBtn').disabled = true;
    
    if (beepInterval) clearInterval(beepInterval);
    beepInterval = setInterval(() => {
      if (isRinging) playBeep();
    }, 1500);
  }
  
  function playBeep() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
      osc.stop(audioCtx.currentTime + 0.5);
    } catch(e) {}
  }
  
  function stopRinging() {
    if (beepInterval) clearInterval(beepInterval);
    isRinging = false;
    document.getElementById('ringingSection').style.display = 'none';
    alarmTime = null;
  }
  
  function addStep() {
    if (!isRinging) return;
    if (currentSteps < 30) {
      currentSteps++;
      document.getElementById('stepCount').innerHTML = `Steps: ${currentSteps} / 30`;
      if (currentSteps >= 30) {
        stopRinging();
        showStatus('🎉 You ran enough! Alarm stopped!', 'success');
      }
    }
  }
  
  function checkAlarm() {
    if (!alarmTime || isRinging || !isProUnlocked) return;
    if (Date.now() >= alarmTime) {
      startRinging();
    }
  }
  
  function initSpeedTracker() {
    if (window.DeviceMotionEvent) {
      const handler = (e) => {
        const acc = e.acceleration;
        if (!acc || !isProUnlocked) return;
        
        const now = Date.now();
        if (lastTimestamp === 0) {
          lastTimestamp = now;
          lastAccel = { x: acc.x || 0, y: acc.y || 0, z: acc.z || 0 };
          return;
        }
        
        const dt = (now - lastTimestamp) / 1000;
        if (dt > 0.05 && dt < 0.5) {
          let deltaVx = ((acc.x || 0) - lastAccel.x) * dt;
          let deltaVy = ((acc.y || 0) - lastAccel.y) * dt;
          let deltaVz = ((acc.z || 0) - lastAccel.z) * dt;
          let speedChange = Math.sqrt(deltaVx*deltaVx + deltaVy*deltaVy + deltaVz*deltaVz) * 15;
          currentSpeed = Math.min(25, Math.max(0, speedChange));
          
          document.getElementById('speedValue').innerHTML = `${currentSpeed.toFixed(2)} km/h`;
          
          if (isRinging) {
            document.getElementById('ringingSpeed').innerHTML = `Speed: ${currentSpeed.toFixed(2)} km/h`;
            if (currentSpeed >= 8) {
              stopRinging();
              showStatus('🎉 You reached 8 km/h! Alarm stopped!', 'success');
            }
          }
        }
        lastTimestamp = now;
        lastAccel = { x: acc.x || 0, y: acc.y || 0, z: acc.z || 0 };
      };
      
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        document.body.addEventListener('click', () => {
          DeviceMotionEvent.requestPermission().then(state => {
            if (state === 'granted') window.addEventListener('devicemotion', handler);
          }).catch(e=>console.log);
        }, { once: true });
      } else {
        window.addEventListener('devicemotion', handler);
      }
    }
  }
  
  // Timer
  let timerSeconds = 0, timerActive = false, timerInt = null;
  function updateTimerDisplay() {
    let hrs = Math.floor(timerSeconds / 3600);
    let mins = Math.floor((timerSeconds % 3600) / 60);
    let secs = timerSeconds % 60;
    document.getElementById('timerDisplay').innerHTML = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }
  
  document.getElementById('startTimer').onclick = () => {
    if (timerActive) return;
    if (timerSeconds <= 0) timerSeconds = 60;
    timerActive = true;
    timerInt = setInterval(() => {
      if (timerActive && timerSeconds > 0) {
        timerSeconds--;
        updateTimerDisplay();
      } else if (timerSeconds === 0) {
        timerActive = false;
        clearInterval(timerInt);
        alert('Timer finished!');
      }
    }, 1000);
  };
  
  document.getElementById('pauseTimer').onclick = () => {
    timerActive = false;
    if (timerInt) clearInterval(timerInt);
  };
  
  document.getElementById('resetTimer').onclick = () => {
    timerActive = false;
    if (timerInt) clearInterval(timerInt);
    timerSeconds = 0;
    updateTimerDisplay();
  };
  
  // Stopwatch
  let swMs = 0, swRun = false, swInt = null;
  function updateSwDisplay() {
    let secs = Math.floor(swMs / 1000);
    let mins = Math.floor(secs / 60);
    let hrs = Math.floor(mins / 60);
    let cent = Math.floor((swMs % 1000) / 10);
    document.getElementById('stopwatchDisplay').innerHTML = `${hrs.toString().padStart(2,'0')}:${(mins%60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}.${cent.toString().padStart(2,'0')}`;
  }
  
  document.getElementById('swStart').onclick = () => {
    if (!swRun) {
      swRun = true;
      swInt = setInterval(() => { if (swRun) { swMs += 10; updateSwDisplay(); } }, 10);
    }
  };
  
  document.getElementById('swPause').onclick = () => { swRun = false; if (swInt) clearInterval(swInt); };
  document.getElementById('swReset').onclick = () => { swRun = false; if (swInt) clearInterval(swInt); swMs = 0; updateSwDisplay(); };
  
  // Live Clock
  function updateClock() {
    document.getElementById('liveClock').innerHTML = new Date().toLocaleTimeString('en-US', { hour12: false });
  }
  
  // ==================== INITIALIZATION ====================
  async function init() {
    updateProUI();
    updateClock();
    setInterval(() => { updateClock(); checkAlarm(); }, 500);
    initSpeedTracker();
    await checkExistingSession();
  }
  
  // Event Listeners
  document.getElementById('signInBtn').onclick = authenticateWithPi;
  document.getElementById('signOutBtn').onclick = signOut;
  document.getElementById('buyProBtn').onclick = buyPro;
  document.getElementById('setAlarmBtn').onclick = setAlarm;
  document.getElementById('simulateStepBtn').onclick = addStep;
  document.getElementById('stopAlarmBtn').onclick = () => { if (currentSteps >= 30) stopRinging(); };
  
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
      document.getElementById(`${btn.dataset.tab}Panel`).classList.add('active-panel');
    };
  });
  
  init();
</script>
</body>
</html>
